<!DOCTYPE html>
<html>

<body>
    <h1>JavaScript Arrays</h1>
    <h2>The slice() Method</h2>
    <p>Slice out a part of an array starting from array element 1 ("Orange"):</p>

    <p id="demo"></p>
    <p id="demo1"></p>

    <script>
        const fruits = ["Banana", "Orange", "Lemon", "Apple", "Mango", "Tomoto", "Chilli", "Potato"];
        const citrus = fruits.slice(1);
        const veggies = fruits.slice(5);
        document.getElementById("demo").innerHTML = fruits + "<br><br>" + citrus;
        document.getElementById("demo1").innerHTML = veggies;
    </script>

</body>

</html>
