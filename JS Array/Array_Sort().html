<!DOCTYPE html>
<html>

<body>
    <h1>JavaScript Arrays</h1>
    <h2>The sort() Method</h2>

    <p>Sort car objects on age:</p>

    <p id="demo"></p>
    <p id="demo1"></p>

    <script>
        const cars = [
            { type: "Volvo", year: 2016 },
            { type: "Saab", year: 2001 },
            { type: "BMW", year: 2010 }
        ];

        const studentList = [
            { name: "Chirag", age: 28 },
            { name: "Dixita", age: 25 },
            { name: "Deepak", age: 19 }
        ];

        displayCars();

        displaystudentList();

        cars.sort(function (a, b) { return a.year - b.year });
        displayCars();

        studentList.sort(function (n, a) { return n.name.localeCompare(a.name) });
        displaystudentList();

        function displayCars() {
            document.getElementById("demo").innerHTML =
                cars[0].type + " " + cars[0].year + "<br>" +
                cars[1].type + " " + cars[1].year + "<br>" +
                cars[2].type + " " + cars[2].year;
        }

        function displaystudentList() {
            document.getElementById("demo1").innerHTML =
                studentList[0].name + " " + studentList[0].age + "<br>" +
                studentList[1].name + " " + studentList[1].age + "<br>" +
                studentList[2].name + " " + studentList[2].age;
        }
    </script>

</body>

</html>
