<!DOCTYPE html>
<html>

<body>
    <h1>JavaScript Arrays</h1>
    <h2>The concat() Method</h2>

    <p>The concat() method merges (concatenates) arrays:</p>

    <p id="demo"></p>

    <script>
        const array1 = ["Cecilie", "Lone"];
        const array2 = ["Emil", "Tobias", "Linus"];
        const array3 = ["Robin", "Morgan"];
        const add = ["Chirag", "Bhavik"];

        const myChildren = array1.concat(array2, array3, add);

        document.getElementById("demo").innerHTML = myChildren.join("<br>");;
    </script>

</body>

</html>
