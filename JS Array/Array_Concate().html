<!DOCTYPE html>
<html>

<body>
    <h1>JavaScript Arrays</h1>
    <h2>The concat() Method</h2>

    <p>The concat() method merges (concatenates) arrays:</p>

    <p id="demo"></p>
    <h1 id="show"></h1>

    <script>
        const array1 = ["Cecilie", "Lone"];
        const array2 = ["Emil", "Tobias", "Linus"];
        const array3 = ["Robin", "Morgan"];
        let array4 = ["Chirag", "Pratik", "Bhavik"];
        let myChildren = array1.concat(array2, array3, array4);

        document.getElementById("demo").innerHTML = myChildren;
        document.getElementById("show").innerHTML = myChildren[7];
    </script>

</body>

</html>
