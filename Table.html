<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            padding: 6px 12px;
        }
        #result {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h2>Multiplication Table Generator</h2>

<label>Enter table:</label>
<input type="number" id="table">

<br>

<label>Upto:</label>
<input type="number" id="upto">

<br>

<button onclick="generateTable()">Generate Table</button>

<div id="result"></div>

<script>
function generateTable() {
    let table = document.getElementById("table").value;
    let upto = document.getElementById("upto").value;

    let output = "";

    for (let i = 1; i <= upto; i++) {
        output += table + " x " + i + " = " + (table * i) + "<br>";
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
